<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Card Quest - Battle Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .battle-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        /* Top Section - Turn Order Carousel */
        .turn-order-section {
            height: 100px;
            background: rgba(20, 25, 45, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.3);
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
        }

        .turn-order-label {
            font-size: 14px;
            color: #8fa3ff;
            white-space: nowrap;
            margin-right: 10px;
        }

        .turn-order-carousel {
            display: flex;
            gap: 10px;
            flex: 1;
            overflow: hidden;
            padding: 5px;
            justify-content: flex-start;
        }

        .turn-unit {
            min-width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2f4f 100%);
            border: 2px solid #4a6fa5;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .turn-unit.active {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }

        .turn-unit.ally {
            border-color: #4a9eff;
        }

        .turn-unit.enemy {
            border-color: #ff4a4a;
        }

        .turn-unit-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 3px;
        }

        .turn-unit-name {
            font-size: 10px;
            text-align: center;
            color: #ccc;
        }

        /* Middle Section - Battle Grid */
        .battle-grid-section {
            flex: 1;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .team-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-label {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            background: rgba(20, 25, 45, 0.6);
            border-radius: 8px;
        }

        .team-label.allies {
            color: #4a9eff;
            border: 2px solid rgba(74, 158, 255, 0.3);
        }

        .team-label.enemies {
            color: #ff4a4a;
            border: 2px solid rgba(255, 74, 74, 0.3);
        }

        .battle-grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 140px);
            gap: 10px;
        }

        .grid-cell {
            background: rgba(30, 35, 55, 0.5);
            border: 2px solid rgba(100, 120, 180, 0.2);
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .grid-cell:hover {
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(40, 45, 65, 0.7);
        }

        .grid-cell.occupied {
            background: linear-gradient(135deg, rgba(50, 60, 90, 0.8) 0%, rgba(30, 40, 70, 0.8) 100%);
        }

        .unit-card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
        }

        .unit-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 5px;
            border: 2px solid #fff;
        }

        .unit-card.ally .unit-image {
            border-color: #4a9eff;
        }

        .unit-card.enemy .unit-image {
            border-color: #ff4a4a;
        }

        .unit-name {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 3px;
        }

        .unit-hp {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3px;
        }

        .unit-hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            transition: width 0.3s;
        }

        .unit-stats {
            font-size: 9px;
            color: #aaa;
            text-align: center;
        }

        .vs-divider {
            font-size: 48px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Bottom Section */
        .bottom-section {
            height: 180px;
            display: flex;
            gap: 20px;
        }

        /* Combat Log - Left - 1/3 */
        .combat-log {
            flex: 0 0 30%;
            background: rgba(20, 25, 45, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .combat-log-title {
            font-size: 14px;
            font-weight: bold;
            color: #8fa3ff;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
        }

        .log-entry {
            font-size: 12px;
            padding: 5px;
            margin-bottom: 3px;
            border-left: 3px solid transparent;
            padding-left: 8px;
        }

        .log-entry.damage {
            color: #ff6b6b;
            border-left-color: #ff4a4a;
        }

        .log-entry.heal {
            color: #4ade80;
            border-left-color: #22c55e;
        }

        .log-entry.info {
            color: #8fa3ff;
            border-left-color: #4a9eff;
        }

        /* Control Panel - Right */
        .control-panel {
            flex: 0 0 30%;
            background: rgba(20, 25, 45, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Action Buttons - Center */
        .action-buttons-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .main-action-button {
            padding: 20px 30px;
            border: 3px solid;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: rgba(30, 35, 55, 0.8);
            min-width: 140px;
            position: relative;
        }

        .main-action-button.attack {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .main-action-button.attack:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(1.05);
        }

        .main-action-button.ability {
            border-color: #ffd700;
            color: #ffd700;
        }

        .main-action-button.ability:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        .main-action-button.skip {
            border-color: #8fa3ff;
            color: #8fa3ff;
        }

        .main-action-button.skip:hover {
            background: rgba(143, 163, 255, 0.2);
            transform: scale(1.05);
        }

        .main-action-button.active {
            box-shadow: 0 0 20px currentColor;
        }

        .control-button {
            padding: 12px 20px;
            border: 2px solid;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: rgba(30, 35, 55, 0.6);
        }

        .control-button.auto {
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .control-button.auto:hover {
            background: rgba(74, 158, 255, 0.2);
        }

        .control-button.fast {
            border-color: #ffd700;
            color: #ffd700;
        }

        .control-button.fast:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .control-button.exit {
            border-color: #ff4a4a;
            color: #ff4a4a;
        }

        .control-button.exit:hover {
            background: rgba(255, 74, 74, 0.2);
        }

        .round-info {
            text-align: center;
            padding: 10px;
            background: rgba(40, 45, 65, 0.5);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .round-label {
            font-size: 12px;
            color: #8fa3ff;
        }

        .round-number {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        /* Skill Tooltip */
        .skill-tooltip {
            position: fixed;
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2f4f 100%);
            border: 2px solid #4a9eff;
            border-radius: 10px;
            padding: 15px;
            max-width: 300px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .skill-tooltip.show {
            display: block;
        }

        .skill-tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .skill-tooltip-desc {
            font-size: 12px;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .skill-tooltip-stats {
            font-size: 11px;
            color: #8fa3ff;
            padding-top: 8px;
            border-top: 1px solid rgba(100, 150, 255, 0.2);
        }

        /* Damage/Effect Preview on Hover */
        .damage-preview {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        .grid-cell.target-preview .damage-preview {
            display: block;
        }

        .damage-preview.heal {
            background: rgba(74, 222, 128, 0.9);
        }

        .damage-preview.buff {
            background: rgba(255, 215, 0, 0.9);
        }

        /* Unit Detail Modal */
        .unit-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .unit-detail-modal.show {
            display: flex;
        }

        .unit-detail-card {
            width: 500px;
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2f4f 100%);
            border: 3px solid #4a9eff;
            border-radius: 15px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .unit-detail-card.enemy {
            border-color: #ff4a4a;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(255, 74, 74, 0.3);
            border: 2px solid #ff4a4a;
            border-radius: 50%;
            color: #ff4a4a;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: rgba(255, 74, 74, 0.5);
            transform: scale(1.1);
        }

        .unit-detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(100, 150, 255, 0.3);
        }

        .unit-detail-image {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border: 3px solid #4a9eff;
        }

        .unit-detail-info {
            flex: 1;
        }

        .unit-detail-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .unit-detail-hp-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .unit-detail-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            transition: width 0.3s;
        }

        .unit-detail-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(40, 45, 65, 0.5);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #4a9eff;
        }

        .stat-label {
            font-size: 12px;
            color: #8fa3ff;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        .unit-detail-abilities {
            margin-top: 20px;
        }

        .abilities-title {
            font-size: 16px;
            font-weight: bold;
            color: #8fa3ff;
            margin-bottom: 10px;
        }

        .ability-item {
            background: rgba(40, 45, 65, 0.5);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #ffd700;
        }

        .ability-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .ability-desc {
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="battle-screen">
        <!-- Turn Order Carousel -->
        <div class="turn-order-section">
            <div class="turn-order-label">ОЧЕРЕДНОСТЬ ХОДОВ:</div>
            <div class="turn-order-carousel" id="turnOrderCarousel">
                <!-- Generated dynamically -->
            </div>
        </div>

        <!-- Battle Grid -->
        <div class="battle-grid-section">
            <!-- Allies Team -->
            <div class="team-container">
                <div class="team-label allies">СОЮЗНИКИ</div>
                <div class="battle-grid" id="alliesGrid">
                    <!-- 3x3 grid cells -->
                </div>
            </div>

            <div class="vs-divider">VS</div>

            <!-- Enemies Team -->
            <div class="team-container">
                <div class="team-label enemies">ВРАГИ</div>
                <div class="battle-grid" id="enemiesGrid">
                    <!-- 3x3 grid cells -->
                </div>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <!-- Combat Log -->
            <div class="combat-log">
                <div class="combat-log-title">ЛОГ БОЯ</div>
                <div id="combatLogContent">
                    <div class="log-entry info">Бой начался! Раунд 1</div>
                </div>
            </div>

            <!-- Action Buttons Center -->
            <div class="action-buttons-section">
                <button class="main-action-button attack" onclick="selectAction('attack')">
                    ⚔️<br>Атака
                </button>
                <button class="main-action-button ability" onmouseover="showAbilityTooltip(event)" onmouseout="hideSkillTooltip()" onclick="selectAction('ability')">
                    ✨<br>Способность
                </button>
                <button class="main-action-button skip" onclick="skipTurn()">
                    ⏭️<br>Пропустить
                </button>
            </div>

            <!-- Control Panel -->
            <div class="control-panel">
                <div class="round-info">
                    <div class="round-label">Раунд</div>
                    <div class="round-number" id="roundNumber">1</div>
                </div>
                <button class="control-button auto" onclick="toggleAuto()">
                    <span id="autoText">▶ Авто</span>
                </button>
                <button class="control-button fast" onclick="toggleFast()">
                    <span id="fastText">⚡ Быстро</span>
                </button>
                <button class="control-button exit" onclick="exitBattle()">
                    ✕ Выйти
                </button>
            </div>
        </div>
    </div>

    <!-- Skill Tooltip -->
    <div class="skill-tooltip" id="skillTooltip">
        <div class="skill-tooltip-title" id="tooltipTitle"></div>
        <div class="skill-tooltip-desc" id="tooltipDesc"></div>
        <div class="skill-tooltip-stats" id="tooltipStats"></div>
    </div>

    <!-- Unit Detail Modal -->
    <div class="unit-detail-modal" id="unitDetailModal" onclick="closeUnitDetail(event)">
        <div class="unit-detail-card" id="unitDetailCard" onclick="event.stopPropagation()">
            <div class="close-modal" onclick="closeUnitDetail()">✕</div>
            <div class="unit-detail-header">
                <div class="unit-detail-image" id="detailImage">⚔️</div>
                <div class="unit-detail-info">
                    <div class="unit-detail-name" id="detailName">Рыцарь</div>
                    <div class="unit-detail-hp-bar">
                        <div class="unit-detail-hp-fill" id="detailHpFill" style="width: 100%"></div>
                    </div>
                    <div id="detailHpText">100 / 100 HP</div>
                </div>
            </div>
            <div class="unit-detail-stats-grid" id="detailStatsGrid">
                <!-- Stats populated by JS -->
            </div>
            <div class="unit-detail-abilities" id="detailAbilities">
                <!-- Abilities populated by JS -->
            </div>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            round: 1,
            autoMode: false,
            fastMode: false,
            currentTurn: 0,
            selectedAction: null // 'attack', 'ability', or null
        };

        // Sample Units Data
        const allies = [
            { 
                id: 1, 
                name: 'Рыцарь', 
                icon: '⚔️', 
                hp: 100, 
                maxHp: 100, 
                row: 0, 
                col: 1, 
                speed: 5,
                attack: 25,
                defense: 20,
                magic: 5,
                abilities: [
                    { name: 'Мощный удар', desc: 'Наносит 150% урона, откат 2 хода' },
                    { name: 'Защитная стойка', desc: 'Увеличивает защиту на 50% на 1 ход' }
                ]
            },
            { 
                id: 2, 
                name: 'Лучник', 
                icon: '🏹', 
                hp: 75, 
                maxHp: 80, 
                row: 1, 
                col: 0, 
                speed: 7,
                attack: 20,
                defense: 10,
                magic: 8,
                abilities: [
                    { name: 'Меткий выстрел', desc: 'Гарантированное попадание, 120% урона' },
                    { name: 'Залп стрел', desc: 'Атакует всех врагов в ряду' }
                ]
            },
            { 
                id: 3, 
                name: 'Маг', 
                icon: '🔮', 
                hp: 60, 
                maxHp: 60, 
                row: 1, 
                col: 2, 
                speed: 6,
                attack: 10,
                defense: 8,
                magic: 30,
                abilities: [
                    { name: 'Огненный шар', desc: 'Наносит магический урон огнём' },
                    { name: 'Исцеление', desc: 'Восстанавливает 30 HP союзнику' }
                ]
            }
        ];

        const enemies = [
            { 
                id: 4, 
                name: 'Орк', 
                icon: '👹', 
                hp: 90, 
                maxHp: 120, 
                row: 0, 
                col: 1, 
                speed: 4,
                attack: 22,
                defense: 18,
                magic: 3,
                abilities: [
                    { name: 'Берсерк', desc: 'Увеличивает атаку на 30%, снижает защиту' }
                ]
            },
            { 
                id: 5, 
                name: 'Гоблин', 
                icon: '👺', 
                hp: 50, 
                maxHp: 50, 
                row: 1, 
                col: 0, 
                speed: 8,
                attack: 15,
                defense: 8,
                magic: 5,
                abilities: [
                    { name: 'Коварный удар', desc: 'Атакует дважды с 50% урона' }
                ]
            },
            { 
                id: 6, 
                name: 'Тролль', 
                icon: '🧟', 
                hp: 150, 
                maxHp: 150, 
                row: 2, 
                col: 1, 
                speed: 3,
                attack: 28,
                defense: 25,
                magic: 1,
                abilities: [
                    { name: 'Регенерация', desc: 'Восстанавливает 15 HP каждый ход' }
                ]
            }
        ];

        // Skills Database
        const skills = {
            attack: {
                name: 'Атака',
                desc: 'Обычная атака оружием. Наносит физический урон одной цели.',
                stats: 'Урон: 15-25 | Точность: 90%'
            },
            fireball: {
                name: 'Огненный шар',
                desc: 'Метает огненный шар во врага. Наносит магический урон огнем.',
                stats: 'Урон: 30-40 | Стоимость: 3 маны | Тип: Огонь'
            },
            heal: {
                name: 'Исцеление',
                desc: 'Восстанавливает здоровье союзника с помощью светлой магии.',
                stats: 'Лечение: 25-35 | Стоимость: 4 маны'
            },
            powerStrike: {
                name: 'Мощный удар',
                desc: 'Концентрирует силу для разрушительного удара. Высокий урон, но долгая перезарядка.',
                stats: 'Урон: 40-60 | Откат: 3 хода | Шанс крит: 30%'
            }
        };

        // Initialize Battle Grid
        function initBattleGrid() {
            const alliesGrid = document.getElementById('alliesGrid');
            const enemiesGrid = document.getElementById('enemiesGrid');

            // Create 3x3 grid cells for allies
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const cell = createGridCell(row, col, 'ally');
                    alliesGrid.appendChild(cell);
                }
            }

            // Create 3x3 grid cells for enemies
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const cell = createGridCell(row, col, 'enemy');
                    enemiesGrid.appendChild(cell);
                }
            }

            // Place units
            allies.forEach(unit => placeUnit(unit, 'ally'));
            enemies.forEach(unit => placeUnit(unit, 'enemy'));

            // Initialize turn order
            initTurnOrder();
        }

        function createGridCell(row, col, team) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.row = row;
            cell.dataset.col = col;
            cell.dataset.team = team;
            return cell;
        }

        function placeUnit(unit, team) {
            const grid = team === 'ally' ? document.getElementById('alliesGrid') : document.getElementById('enemiesGrid');
            const cells = grid.querySelectorAll('.grid-cell');
            const targetCell = Array.from(cells).find(cell => 
                parseInt(cell.dataset.row) === unit.row && 
                parseInt(cell.dataset.col) === unit.col
            );

            if (targetCell) {
                targetCell.classList.add('occupied');
                targetCell.dataset.unitId = unit.id;
                targetCell.innerHTML = `
                    <div class="unit-card ${team}">
                        <div class="unit-image">${unit.icon}</div>
                        <div class="unit-name">${unit.name}</div>
                        <div class="unit-hp">
                            <div class="unit-hp-bar" style="width: ${(unit.hp / unit.maxHp) * 100}%"></div>
                        </div>
                        <div class="unit-stats">${unit.hp}/${unit.maxHp} HP</div>
                    </div>
                    <div class="damage-preview">-35 урона</div>
                `;
                
                // Add click handler to show unit details
                targetCell.addEventListener('click', () => {
                    if (!gameState.selectedAction) {
                        showUnitDetail(unit, team);
                    }
                });
                
                // Add hover handler for damage preview when action is selected
                targetCell.addEventListener('mouseenter', () => {
                    if (gameState.selectedAction && team === 'enemy') {
                        targetCell.classList.add('target-preview');
                        updateDamagePreview(targetCell, unit);
                    }
                });
                
                targetCell.addEventListener('mouseleave', () => {
                    targetCell.classList.remove('target-preview');
                });
            }
        }

        function initTurnOrder() {
            const allUnits = [...allies, ...enemies].sort((a, b) => b.speed - a.speed);
            const carousel = document.getElementById('turnOrderCarousel');
            
            allUnits.forEach((unit, index) => {
                const isAlly = allies.some(a => a.id === unit.id);
                const turnUnit = document.createElement('div');
                turnUnit.className = `turn-unit ${isAlly ? 'ally' : 'enemy'} ${index === 0 ? 'active' : ''}`;
                turnUnit.innerHTML = `
                    <div class="turn-unit-icon">${unit.icon}</div>
                    <div class="turn-unit-name">${unit.name}</div>
                `;
                carousel.appendChild(turnUnit);
            });
        }

        function showSkillTooltip(event, skillKey) {
            const tooltip = document.getElementById('skillTooltip');
            const skill = skills[skillKey];
            
            document.getElementById('tooltipTitle').textContent = skill.name;
            document.getElementById('tooltipDesc').textContent = skill.desc;
            document.getElementById('tooltipStats').textContent = skill.stats;
            
            tooltip.classList.add('show');
            
            const x = event.clientX + 15;
            const y = event.clientY + 15;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideSkillTooltip() {
            const tooltip = document.getElementById('skillTooltip');
            tooltip.classList.remove('show');
        }

        function selectAction(actionType) {
            // Toggle action selection
            if (gameState.selectedAction === actionType) {
                gameState.selectedAction = null;
            } else {
                gameState.selectedAction = actionType;
            }
            
            // Update button states
            document.querySelectorAll('.main-action-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (gameState.selectedAction) {
                event.target.closest('.main-action-button').classList.add('active');
                addLogEntry(`Выбрано действие: ${actionType === 'attack' ? 'Атака' : 'Способность'}`, 'info');
            }
        }

        function updateDamagePreview(cell, unit) {
            const preview = cell.querySelector('.damage-preview');
            if (!preview) return;
            
            if (gameState.selectedAction === 'attack') {
                const damage = Math.floor(Math.random() * 15) + 20; // 20-35 damage
                preview.textContent = `-${damage} урона`;
                preview.className = 'damage-preview';
            } else if (gameState.selectedAction === 'ability') {
                // Example: area effect ability
                preview.textContent = `Огонь: -40 урона`;
                preview.className = 'damage-preview';
            }
        }

        function showUnitDetail(unit, team) {
            const modal = document.getElementById('unitDetailModal');
            const card = document.getElementById('unitDetailCard');
            
            // Update card border color based on team
            if (team === 'enemy') {
                card.classList.add('enemy');
            } else {
                card.classList.remove('enemy');
            }
            
            // Update header
            document.getElementById('detailImage').textContent = unit.icon;
            document.getElementById('detailName').textContent = unit.name;
            document.getElementById('detailHpFill').style.width = `${(unit.hp / unit.maxHp) * 100}%`;
            document.getElementById('detailHpText').textContent = `${unit.hp} / ${unit.maxHp} HP`;
            
            // Update stats
            const statsGrid = document.getElementById('detailStatsGrid');
            statsGrid.innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">Атака</div>
                    <div class="stat-value">${unit.attack || 15}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Защита</div>
                    <div class="stat-value">${unit.defense || 10}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Магия</div>
                    <div class="stat-value">${unit.magic || 5}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Скорость</div>
                    <div class="stat-value">${unit.speed}</div>
                </div>
            `;
            
            // Update abilities
            const abilitiesSection = document.getElementById('detailAbilities');
            if (unit.abilities && unit.abilities.length > 0) {
                abilitiesSection.innerHTML = `
                    <div class="abilities-title">Способности:</div>
                    ${unit.abilities.map(ability => `
                        <div class="ability-item">
                            <div class="ability-name">${ability.name}</div>
                            <div class="ability-desc">${ability.desc}</div>
                        </div>
                    `).join('')}
                `;
            } else {
                abilitiesSection.innerHTML = '';
            }
            
            modal.classList.add('show');
        }

        function closeUnitDetail(event) {
            if (!event || event.target === event.currentTarget) {
                document.getElementById('unitDetailModal').classList.remove('show');
            }
        }

        function showAbilityTooltip(event) {
            const tooltip = document.getElementById('skillTooltip');
            
            document.getElementById('tooltipTitle').textContent = 'Огненный шар';
            document.getElementById('tooltipDesc').textContent = 'Метает огненный шар во врага. Наносит магический урон огнем.';
            document.getElementById('tooltipStats').textContent = 'Урон: 30-40 | Стоимость: 3 маны | Тип: Огонь';
            
            tooltip.classList.add('show');
            
            const x = event.clientX + 15;
            const y = event.clientY + 15;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function skipTurn() {
            addLogEntry('Ход пропущен', 'info');
            gameState.selectedAction = null;
            document.querySelectorAll('.main-action-button').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        function useSkill(skillName, unitId) {
            const skill = skills[skillName];
            addLogEntry(`Использован навык: ${skill.name}`, 'info');
            
            // Simulate damage/effect
            setTimeout(() => {
                if (skillName === 'heal') {
                    addLogEntry(`${skill.name} восстановил 30 HP`, 'heal');
                } else {
                    addLogEntry(`${skill.name} нанёс 35 урона`, 'damage');
                }
            }, 500);
        }

        function addLogEntry(text, type = 'info') {
            const logContent = document.getElementById('combatLogContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function toggleAuto() {
            gameState.autoMode = !gameState.autoMode;
            const btn = document.getElementById('autoText');
            btn.textContent = gameState.autoMode ? '⏸ Стоп' : '▶ Авто';
            addLogEntry(gameState.autoMode ? 'Автобой включен' : 'Автобой выключен', 'info');
        }

        function toggleFast() {
            gameState.fastMode = !gameState.fastMode;
            const btn = document.getElementById('fastText');
            btn.textContent = gameState.fastMode ? '⚡ Быстро (ON)' : '⚡ Быстро';
            addLogEntry(gameState.fastMode ? 'Быстрый режим включен' : 'Быстрый режим выключен', 'info');
        }

        function exitBattle() {
            if (confirm('Вы уверены, что хотите выйти из боя?')) {
                addLogEntry('Выход из боя...', 'info');
                // Here you would navigate back or close battle
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initBattleGrid();
            
            // Simulate some combat for demonstration
            setTimeout(() => {
                addLogEntry('Рыцарь атакует Орка!', 'info');
                addLogEntry('Нанесено 23 урона', 'damage');
            }, 2000);
            
            setTimeout(() => {
                addLogEntry('Гоблин стреляет в Лучника', 'info');
                addLogEntry('Нанесено 18 урона', 'damage');
            }, 4000);
        });
    </script>
</body>
</html>
